name: CI/CD Pipeline with Antigravity Agent

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build, Test & Lint
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository code to the runner
      - name: Checkout Code
        uses: actions/checkout@v6

      # Set up Node.js environment with version 24
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      # Install npm packages defined in package.json
      - name: Install Dependencies
        run: npm install

      # Run syntax/formatting checks on the code
      - name: Run Linter
        run: npm run lint

      # Run the project's native test suite
      - name: Run Tests
        run: npm test

  antigravity-audit:
    name: Antigravity Code Audit
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANTIGRAVITY_TOKEN: ${{ secrets.ANTIGRAVITY_TOKEN }}
    
    steps:
      # Checkout the repository code to the runner
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}


      # Download, install, and add the Antigravity CLI ('agy') to the runner's PATH
      - name: Install Antigravity CLI
        if: ${{ env.ANTIGRAVITY_TOKEN != '' }}
        run: |
          # Fetch and execute the official installation script
          curl -fsSL https://antigravity.google/cli/install.sh | bash
          # Add the installation path to GITHUB_PATH to make 'agy' available in subsequent steps
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # Setup local credential file for the CLI using the repository secret
      - name: Configure Credentials
        if: ${{ env.ANTIGRAVITY_TOKEN != '' }}
        run: |
          mkdir -p $HOME/.gemini/antigravity-cli
          printf '{"token":{"access_token":"","token_type":"Bearer","refresh_token":"%s","expiry":"0001-01-01T00:00:00Z"},"auth_method":"consumer"}\n' "$ANTIGRAVITY_TOKEN" > $HOME/.gemini/antigravity-cli/antigravity-oauth-token
          chmod 600 $HOME/.gemini/antigravity-cli/antigravity-oauth-token


      # Run a headless AI audit using the 'agy' CLI and save it to audit_report.md
      - name: Run Automated Audit
        if: ${{ env.ANTIGRAVITY_TOKEN != '' }}
        run: |
          # Initialize the markdown file with a header
          echo "### Antigravity AI Code Audit Report" > audit_report.md
          # Append the generation timestamp to the file
          echo "Generated on: $(date)" >> audit_report.md
          # Add a blank spacing line
          echo "" >> audit_report.md
          # Run non-interactive agent audit print mode to output markdown report
          agy --print "Perform a security, quality, and structure audit on the repository. Highlight potential issues, code quality, and adherence to AGENTS.md instructions. Format the output in Markdown." --dangerously-skip-permissions >> audit_report.md

      # Commit and push the generated audit report back to the repository
      - name: Commit and Push Audit Report
        if: ${{ env.ANTIGRAVITY_TOKEN != '' }}
        env:
          TARGET_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add audit_report.md
          git diff-index --quiet HEAD || git commit -m "docs: update Antigravity AI Code Audit Report [skip ci]"
          git push origin HEAD:refs/heads/"$TARGET_REF"



      # Upload the generated report file as a GitHub Actions build artifact
      - name: Upload Audit Report
        if: ${{ env.ANTIGRAVITY_TOKEN != '' }}
        uses: actions/upload-artifact@v7
        with:
          path: audit_report.md
          archive: false


